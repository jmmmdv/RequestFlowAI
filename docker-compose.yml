services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mission
      POSTGRES_PASSWORD: mission
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission -d mission_control"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mission-data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    profiles: [observability]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infrastructure/observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on: [tempo]

  tempo:
    image: grafana/tempo:2.7.2
    profiles: [observability]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infrastructure/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo

  prometheus:
    image: prom/prometheus:v3.3.0
    profiles: [observability]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infrastructure/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.1
    profiles: [observability]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infrastructure/observability/grafana:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus, tempo]

volumes:
  mission-data:
  tempo-data:
  prometheus-data:
