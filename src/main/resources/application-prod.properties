spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mission_control}
spring.datasource.username=${DATABASE_USERNAME:mission}
spring.datasource.password=${DATABASE_PASSWORD:mission}
spring.h2.console.enabled=false
mission.seed.enabled=${SEED_DATA:false}
mission.security.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI}
management.endpoints.web.exposure.include=health,info,metrics
springdoc.api-docs.enabled=${OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${OPENAPI_ENABLED:false}
