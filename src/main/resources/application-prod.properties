spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mission_control}
spring.datasource.username=${DATABASE_USERNAME:mission}
spring.datasource.password=${DATABASE_PASSWORD:mission}
spring.h2.console.enabled=false
mission.seed.enabled=${SEED_DATA:false}
mission.security.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI}
management.endpoints.web.exposure.include=health,info,metrics
management.tracing.enabled=${TRACING_ENABLED:false}
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.10}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
springdoc.api-docs.enabled=${OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${OPENAPI_ENABLED:false}
mission.frontend-url=${FRONTEND_URL}
mission.intake.rate-limit.enabled=${INTAKE_RATE_LIMIT_ENABLED:true}
mission.intake.rate-limit.requests-per-minute=${INTAKE_RATE_LIMIT_REQUESTS_PER_MINUTE:10}
