spring.application.name=automation-mission-control
spring.profiles.default=dev
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
mission.seed.enabled=true
mission.security.enabled=false
mission.tenant.default-id=00000000-0000-0000-0000-000000000001
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
management.tracing.enabled=${TRACING_ENABLED:false}
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name},deployment.environment=${spring.profiles.active:dev}
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active:dev}
management.prometheus.metrics.export.enabled=true
info.app.name=Automation Mission Control
info.app.version=@project.version@
server.error.include-message=never
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
logging.pattern.level=%5p [traceId:%X{traceId:-none} spanId:%X{spanId:-none} correlationId:%X{correlationId:-system}]
