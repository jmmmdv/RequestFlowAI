spring.application.name=automation-mission-control
spring.profiles.default=dev
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
mission.seed.enabled=true
mission.security.enabled=false
mission.tenant.default-id=00000000-0000-0000-0000-000000000001
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=Automation Mission Control
info.app.version=@project.version@
server.error.include-message=never
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
logging.pattern.level=%5p [correlationId:%X{correlationId:-system}]
