spring.application.name=requestflow-ai
spring.profiles.default=dev
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
mission.seed.enabled=true
mission.security.enabled=false
mission.tenant.default-id=00000000-0000-0000-0000-000000000001
mission.frontend-url=${FRONTEND_URL:http://localhost:8080}
mission.intake.honeypot-enabled=true
mission.intake.rate-limit.enabled=false
mission.intake.rate-limit.requests-per-minute=10
mission.intake.retention.cron=0 30 3 * * *
mission.notifications.email.enabled=${INTAKE_NOTIFICATION_EMAIL_ENABLED:true}
mission.notifications.email.mode=${INTAKE_NOTIFICATION_EMAIL_MODE:log}
mission.notifications.email.from=${INTAKE_NOTIFICATION_FROM:requestflow@localhost}
mission.notifications.email.fallback-recipient=${INTAKE_NOTIFICATION_FALLBACK_RECIPIENT:}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
management.health.mail.enabled=false
mission.billing.stripe.secret-key=${STRIPE_SECRET_KEY:}
mission.billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
mission.billing.stripe.pro-price-id=${STRIPE_PRO_PRICE_ID:}
mission.billing.stripe.business-price-id=${STRIPE_BUSINESS_PRICE_ID:}
requestflow.ai.budget.enabled=true
requestflow.ai.budget.monthly-budget-usd=50.00
requestflow.ai.budget.warning-threshold-percent=70
requestflow.ai.budget.hard-stop-threshold-percent=90
requestflow.ai.budget.manual-review-after-hard-stop=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
management.tracing.enabled=${TRACING_ENABLED:false}
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name},deployment.environment=${spring.profiles.active:dev}
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active:dev}
management.prometheus.metrics.export.enabled=true
info.app.name=RequestFlow AI
info.app.version=@project.version@
server.error.include-message=never
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
logging.pattern.level=%5p [traceId:%X{traceId:-none} spanId:%X{spanId:-none} correlationId:%X{correlationId:-system}]
