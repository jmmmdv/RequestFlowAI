AWSTemplateFormatVersion: '2010-09-09'
Description: Production App Runner, private PostgreSQL, secrets, dashboards, and alarms

Parameters:
  ImageRepository:
    Type: String
    Description: Immutable ECR image URI including tag or digest
  FrontendUrl:
    Type: String
    Default: https://from-zero-to-hero-azure.vercel.app
    Description: HTTPS browser origin and Cognito callback URL
    AllowedPattern: '^https://.+'
  CognitoDomainPrefix:
    Type: String
    Description: Globally unique Cognito managed-login domain prefix
    AllowedPattern: '^[a-z0-9-]{3,63}$'
  DatabaseName:
    Type: String
    Default: mission_control
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{0,62}$'
  DatabaseUsername:
    Type: String
    Default: mission_admin
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{0,62}$'
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.micro
  DatabaseBackupRetentionDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
  DatabaseMultiAz:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  DatabaseDeletionProtection:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  OtlpTracesEndpoint:
    Type: String
    Default: ''
    Description: Optional HTTPS OTLP HTTP/protobuf endpoint ending in /v1/traces
  AlarmEmail:
    Type: String
    Default: ''
    Description: Optional email address for alarm notifications
  StripeSecretKeyArn:
    Type: String
    Default: ''
    Description: Optional Secrets Manager ARN containing the Stripe test/live secret key
  StripeWebhookSecretArn:
    Type: String
    Default: ''
    Description: Optional Secrets Manager ARN containing the Stripe webhook signing secret
  StripeProPriceId:
    Type: String
    Default: ''
  StripeBusinessPriceId:
    Type: String
    Default: ''

Conditions:
  HasOtlpEndpoint: !Not [!Equals [!Ref OtlpTracesEndpoint, '']]
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]
  HasStripeSecrets: !And
    - !Not [!Equals [!Ref StripeSecretKeyArn, '']]
    - !Not [!Equals [!Ref StripeWebhookSecretArn, '']]

Resources:
  CognitoTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AssignInitialTenantAdmin
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: cognito-idp:AdminAddUserToGroup
                Resource: !Sub 'arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'

  CognitoTriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt CognitoTriggerRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          const crypto = require('crypto');
          const { CognitoIdentityProviderClient, AdminAddUserToGroupCommand } = require('@aws-sdk/client-cognito-identity-provider');
          const client = new CognitoIdentityProviderClient({});
          exports.handler = async (event) => {
            if (event.triggerSource.startsWith('PreSignUp_')) {
              event.request.userAttributes['custom:tenant_id'] = crypto.randomUUID();
              event.request.userAttributes['custom:organization_name'] ||= 'My Organization';
            }
            if (event.triggerSource === 'PostConfirmation_ConfirmSignUp') {
              await client.send(new AdminAddUserToGroupCommand({
                UserPoolId: event.userPoolId, Username: event.userName, GroupName: 'ADMIN'
              }));
            }
            if (event.triggerSource.startsWith('TokenGeneration_')) {
              event.response.claimsAndScopeOverrideDetails = {
                accessTokenGeneration: { claimsToAddOrOverride: {
                  tenant_id: event.request.userAttributes['custom:tenant_id'],
                  organization_name: event.request.userAttributes['custom:organization_name'] || 'My Organization',
                  email: event.request.userAttributes.email
                }},
                idTokenGeneration: { claimsToAddOrOverride: {
                  tenant_id: event.request.userAttributes['custom:tenant_id'],
                  organization_name: event.request.userAttributes['custom:organization_name'] || 'My Organization'
                }}
              };
            }
            return event;
          };

  CognitoInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CognitoTriggerFunction
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  UserPool:
    Type: AWS::Cognito::UserPool
    DependsOn: CognitoInvokePermission
    Properties:
      UserPoolName: automation-mission-control
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      DeletionProtection: ACTIVE
      LambdaConfig:
        PreSignUp: !GetAtt CognitoTriggerFunction.Arn
        PostConfirmation: !GetAtt CognitoTriggerFunction.Arn
        PreTokenGenerationConfig:
          LambdaArn: !GetAtt CognitoTriggerFunction.Arn
          LambdaVersion: V2_0
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: tenant_id
          AttributeDataType: String
          Mutable: true
          StringAttributeConstraints: { MinLength: '36', MaxLength: '36' }
        - Name: organization_name
          AttributeDataType: String
          Mutable: true
          StringAttributeConstraints: { MinLength: '2', MaxLength: '120' }

  CognitoAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: { GroupName: ADMIN, Precedence: 1, UserPoolId: !Ref UserPool }
  CognitoMemberGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: { GroupName: MEMBER, Precedence: 2, UserPoolId: !Ref UserPool }
  CognitoViewerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: { GroupName: VIEWER, Precedence: 3, UserPoolId: !Ref UserPool }

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: [CognitoAdminGroup, CognitoMemberGroup, CognitoViewerGroup]
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: mission-control-browser
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      CallbackURLs: [!Ref FrontendUrl]
      LogoutURLs: [!Ref FrontendUrl]
      SupportedIdentityProviders: [COGNITO]
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits: { AccessToken: hours, IdToken: hours, RefreshToken: days }
      ReadAttributes: [email, custom:tenant_id, custom:organization_name]
      WriteAttributes: [email, custom:organization_name]

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: mission-control-vpc }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.42.0.0/24
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: mission-public-a }]
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.42.1.0/24
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: mission-public-b }]
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.42.10.0/24
      MapPublicIpOnLaunch: false
      Tags: [{ Key: Name, Value: mission-private-a }]
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.42.11.0/24
      MapPublicIpOnLaunch: false
      Tags: [{ Key: Name, Value: mission-private-b }]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicSubnetARouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRouteTable }
  PublicSubnetBRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRouteTable }

  NatElasticIp:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties: { Domain: vpc }
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatElasticIp.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags: [{ Key: Name, Value: mission-control-nat }]
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: { VpcId: !Ref Vpc }
  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
  PrivateSubnetARouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetA, RouteTableId: !Ref PrivateRouteTable }
  PrivateSubnetBRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRouteTable }

  AppRunnerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App Runner outbound access
      VpcId: !Ref Vpc
      SecurityGroupEgress: []
  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL access from App Runner only
      VpcId: !Ref Vpc
      SecurityGroupIngress: []
      SecurityGroupEgress: []
  AppRunnerToDatabaseEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AppRunnerSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref DatabaseSecurityGroup
  AppRunnerHttpsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AppRunnerSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
  AppRunnerDnsUdpEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AppRunnerSecurityGroup
      IpProtocol: udp
      FromPort: 53
      ToPort: 53
      CidrIp: 0.0.0.0/0
  AppRunnerDnsTcpEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AppRunnerSecurityGroup
      IpProtocol: tcp
      FromPort: 53
      ToPort: 53
      CidrIp: 0.0.0.0/0
  DatabaseIngressFromAppRunner:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DatabaseSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref AppRunnerSecurityGroup

  VpcConnector:
    Type: AWS::AppRunner::VpcConnector
    Properties:
      VpcConnectorName: mission-control-private
      Subnets: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
      SecurityGroups: [!Ref AppRunnerSecurityGroup]

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private two-AZ PostgreSQL subnets
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
  DatabasePasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Automation Mission Control PostgreSQL password
      GenerateSecretString:
        PasswordLength: 32
        ExcludePunctuation: true
  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      DBInstanceClass: !Ref DatabaseInstanceClass
      AllocatedStorage: '20'
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      DBName: !Ref DatabaseName
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DatabasePasswordSecret}:SecretString}}'
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      VPCSecurityGroups: [!Ref DatabaseSecurityGroup]
      PubliclyAccessible: false
      MultiAZ: !Ref DatabaseMultiAz
      BackupRetentionPeriod: !Ref DatabaseBackupRetentionDays
      CopyTagsToSnapshot: true
      DeletionProtection: !Ref DatabaseDeletionProtection
      EnableCloudwatchLogsExports: [postgresql, upgrade]
      AutoMinorVersionUpgrade: true
      PreferredBackupWindow: 03:00-04:00
      PreferredMaintenanceWindow: sun:04:00-sun:05:00
      Tags: [{ Key: Service, Value: automation-mission-control }]

  AppRunnerEcrRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: build.apprunner.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess
  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: tasks.apprunner.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadRuntimeSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabasePasswordSecret
                  - !If [HasStripeSecrets, !Ref StripeSecretKeyArn, !Ref AWS::NoValue]
                  - !If [HasStripeSecrets, !Ref StripeWebhookSecretArn, !Ref AWS::NoValue]

  Service:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: automation-mission-control
      InstanceConfiguration:
        Cpu: 1 vCPU
        Memory: 2 GB
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcConnectorArn: !GetAtt VpcConnector.VpcConnectorArn
      SourceConfiguration:
        AutoDeploymentsEnabled: false
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerEcrRole.Arn
        ImageRepository:
          ImageIdentifier: !Ref ImageRepository
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: '8080'
            RuntimeEnvironmentVariables:
              - { Name: SPRING_PROFILES_ACTIVE, Value: prod }
              - { Name: DATABASE_URL, Value: !Sub 'jdbc:postgresql://${Database.Endpoint.Address}:${Database.Endpoint.Port}/${DatabaseName}' }
              - { Name: DATABASE_USERNAME, Value: !Ref DatabaseUsername }
              - { Name: OAUTH2_ISSUER_URI, Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}' }
              - { Name: FRONTEND_URL, Value: !Ref FrontendUrl }
              - { Name: STRIPE_PRO_PRICE_ID, Value: !Ref StripeProPriceId }
              - { Name: STRIPE_BUSINESS_PRICE_ID, Value: !Ref StripeBusinessPriceId }
              - { Name: TRACING_ENABLED, Value: !If [HasOtlpEndpoint, 'true', 'false'] }
              - { Name: TRACING_SAMPLE_RATE, Value: '0.10' }
              - !If
                - HasOtlpEndpoint
                - { Name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT, Value: !Ref OtlpTracesEndpoint }
                - !Ref AWS::NoValue
            RuntimeEnvironmentSecrets:
              - { Name: DATABASE_PASSWORD, Value: !Ref DatabasePasswordSecret }
              - !If
                - HasStripeSecrets
                - { Name: STRIPE_SECRET_KEY, Value: !Ref StripeSecretKeyArn }
                - !Ref AWS::NoValue
              - !If
                - HasStripeSecrets
                - { Name: STRIPE_WEBHOOK_SECRET, Value: !Ref StripeWebhookSecretArn }
                - !Ref AWS::NoValue
      HealthCheckConfiguration:
        Path: /actuator/health/readiness
        Protocol: HTTP
        HealthyThreshold: 1
        UnhealthyThreshold: 5
        Interval: 10
        Timeout: 5

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties: { TopicName: mission-control-alarms }
  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlarmEmail
      TopicArn: !Ref AlarmTopic
  HighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Five or more server errors in five minutes
      Namespace: AWS/AppRunner
      MetricName: 5xxStatusResponses
      Dimensions:
        - { Name: ServiceName, Value: automation-mission-control }
        - { Name: ServiceID, Value: !GetAtt Service.ServiceId }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopic]
      OKActions: [!Ref AlarmTopic]
  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Sustained average latency above one second
      Namespace: AWS/AppRunner
      MetricName: RequestLatency
      Dimensions:
        - { Name: ServiceName, Value: automation-mission-control }
        - { Name: ServiceID, Value: !GetAtt Service.ServiceId }
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 3
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopic]
  LowDatabaseStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: PostgreSQL free storage below two GiB
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions: [{ Name: DBInstanceIdentifier, Value: !Ref Database }]
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2147483648
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: [!Ref AlarmTopic]

  OperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: automation-mission-control
      DashboardBody: !Sub |
        {
          "widgets": [
            {"type":"metric","x":0,"y":0,"width":12,"height":6,"properties":{"title":"Requests and errors","region":"${AWS::Region}","metrics":[["AWS/AppRunner","Requests","ServiceName","automation-mission-control","ServiceID","${Service.ServiceId}",{"stat":"Sum"}],[".","5xxStatusResponses",".",".",".",".",{"stat":"Sum","color":"#d62728"}]],"period":300}},
            {"type":"metric","x":12,"y":0,"width":12,"height":6,"properties":{"title":"Request latency","region":"${AWS::Region}","metrics":[["AWS/AppRunner","RequestLatency","ServiceName","automation-mission-control","ServiceID","${Service.ServiceId}",{"stat":"Average"}]],"period":60}},
            {"type":"metric","x":0,"y":6,"width":12,"height":6,"properties":{"title":"App CPU and memory","region":"${AWS::Region}","metrics":[["AWS/AppRunner","CPUUtilization","ServiceName","automation-mission-control","ServiceID","${Service.ServiceId}"],[".","MemoryUtilization",".",".",".","."]],"period":60}},
            {"type":"metric","x":12,"y":6,"width":12,"height":6,"properties":{"title":"PostgreSQL health","region":"${AWS::Region}","metrics":[["AWS/RDS","CPUUtilization","DBInstanceIdentifier","${Database}"],[".","DatabaseConnections",".","."],[".","FreeStorageSpace",".",".",{"yAxis":"right"}]],"period":300}}
          ]
        }

Outputs:
  ServiceUrl:
    Description: Public App Runner hostname
    Value: !GetAtt Service.ServiceUrl
  DatabaseEndpoint:
    Description: Private PostgreSQL endpoint
    Value: !GetAtt Database.Endpoint.Address
  DatabasePasswordSecretArn:
    Description: Secrets Manager ARN; retrieve only through authorized automation
    Value: !Ref DatabasePasswordSecret
  AlarmTopicArn:
    Value: !Ref AlarmTopic
  DashboardName:
    Value: !Ref OperationsDashboard
  CognitoIssuerUri:
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
  CognitoClientId:
    Value: !Ref UserPoolClient
  CognitoManagedLoginDomain:
    Value: !Sub 'https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
