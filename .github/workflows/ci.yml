name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Validate infrastructure as code
        run: |
          pip install --disable-pip-version-check cfn-lint
          cfn-lint infrastructure/aws/template.yaml
          docker compose --profile observability config --quiet
      - run: ./mvnw --batch-mode clean verify
      - name: Build container image
        run: docker build -t requestflow-ai:ci .
      - name: Scan container image
        uses: aquasec/trivy-action@0.28.0
        with:
          image-ref: requestflow-ai:ci
          severity: HIGH,CRITICAL
          exit-code: 1
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx playwright install --with-deps chromium
      - run: npm test
        env:
          CI: "true"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: verification-evidence
          path: |
            target/surefire-reports
            target/site/jacoco
            playwright-report
            test-results
